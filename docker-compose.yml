services:
  postgres:
    image: postgres:16-alpine
    container_name: homeschool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: homeschool
      POSTGRES_PASSWORD: homeschool
      POSTGRES_DB: homeschool_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeschool -d homeschool_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
